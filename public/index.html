<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control</h1>
      <p>Agent-centered command interface</p>
    </div>
    <div class="top-actions">
      <span id="gatewayDot" class="gateway-dot" title="Gateway"></span>
      <button id="refreshBtn">Refresh</button>
    </div>
  </header>

  <main class="layout">
    <aside class="fleet-panel">
      <div class="panel-head">
        <h2><i data-lucide="satellite-dish"></i> Fleet</h2>
        <span id="fleetCount" class="pill">0</span>
      </div>
      <div id="fleetList" class="fleet-list"></div>
    </aside>

    <section class="agent-workspace">
      <div class="workspace-head">
        <h2 id="agentTitle">Select an agent</h2>
        <div class="workspace-tabs" id="workspaceTabs">
          <button class="wtab active" data-tab="overview">Overview</button>
          <button class="wtab" data-tab="tasks">Tasks</button>
          <button class="wtab" data-tab="control">Control</button>
          <button class="wtab" data-tab="timeline">Timeline</button>
          <button class="wtab" data-tab="files">Files</button>
        </div>
      </div>

      <section id="pane-overview" class="pane active">
        <div id="agentKpis" class="kpi-grid"></div>
        <div id="missionWidgets" class="cards"></div>
        <div id="agentSummary" class="cards"></div>
      </section>

      <section id="pane-tasks" class="pane">
        <div class="row">
          <input id="taskTitle" placeholder="Task title"/>
          <input id="taskTab" placeholder="Feature/mission"/>
          <button id="addTaskBtn">Add task</button>
        </div>
        <div id="taskBoard" class="kanban"></div>
      </section>

      <section id="pane-control" class="pane">
        <div id="agentControls" class="cards"></div>
        <div id="cronCards" class="cards"></div>
      </section>

      <section id="pane-timeline" class="pane">
        <div class="row">
          <input id="activityType" placeholder="Filter type"/>
          <select id="activityWindow">
            <option value="0">All time</option>
            <option value="24">Last 24h</option>
            <option value="168">Last 7d</option>
            <option value="720">Last 30d</option>
          </select>
          <button id="activityFilterBtn">Apply</button>
        </div>
        <div id="timelineCards" class="cards"></div>
      </section>

      <section id="pane-files" class="pane">
        <div id="fileCards" class="cards"></div>
      </section>
    </section>

    <aside class="viewer-panel">
      <div class="panel-head"><h2><i data-lucide="panel-right"></i> Viewer</h2><span id="editingPath" class="meta"></span></div>
      <div class="row">
        <button id="editModeBtn">Edit</button>
        <button id="saveEditBtn">Save</button>
      </div>
      <pre id="viewer">Select file, task result, or timeline event…</pre>
      <textarea id="editor"></textarea>
    </aside>
  </main>

  <nav class="mobile-nav" id="mobileNav">
    <button data-pane="overview"><i data-lucide="layout-grid"></i></button>
    <button data-pane="tasks"><i data-lucide="list-todo"></i></button>
    <button data-pane="control"><i data-lucide="sliders-horizontal"></i></button>
    <button data-pane="timeline"><i data-lucide="timeline"></i></button>
    <button data-pane="files"><i data-lucide="folder"></i></button>
  </nav>

  <script src="/app.js"></script>
</body>
</html>
