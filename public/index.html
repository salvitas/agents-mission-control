<!doctype html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Mission Control</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/styles.css"/>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Mission Control</h1>
      <p>Agent cards + live stream + controls</p>
    </div>
    <div class="top-actions">
      <a class="ghost-link" href="/bootstrap">Bootstrapper</a>
      <span id="gatewayDot" class="gateway-dot" title="Gateway"></span>
      <button id="refreshBtn" class="primary-btn">Refresh</button>
    </div>
  </header>

  <main class="stack">
    <section>
      <h2 class="section-title">Agents</h2>
      <div id="agentCards" class="cards"></div>
    </section>

    <section class="split">
      <div>
        <h2 class="section-title">Live OpenClaw Stream</h2>
        <div class="row">
          <select id="logSource"><option value="gateway">gateway.log</option><option value="error">gateway.err.log</option></select>
          <button id="loadLogsBtn">Reload log</button>
        </div>
        <pre id="logStream">Loading logs…</pre>
      </div>
      <div>
        <h2 class="section-title">Generic Actions</h2>
        <div id="genericActions" class="cards"></div>
      </div>
    </section>

    <section>
      <h2 class="section-title">Viewer</h2>
      <div class="row">
        <button id="editModeBtn">Edit</button>
        <button id="saveEditBtn">Save</button>
        <span id="editingPath" class="meta"></span>
      </div>
      <pre id="viewer">Select an action, file, result, or event…</pre>
      <textarea id="editor"></textarea>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
