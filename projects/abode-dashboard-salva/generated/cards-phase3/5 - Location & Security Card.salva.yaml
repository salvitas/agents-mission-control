########## SECURITY ##########

    - type: custom:mushroom-alarm-control-panel-card
      entity: person.salva
      states:
        - armed_home
        - armed_away
      name: Home Security
      fill_container: false
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            background: none !important;
            box-shadow: none !important;
            padding: 0;
      grid_options:
        columns: 12
        rows: 1

    - type: custom:mushroom-lock-card
      entity: person.salva
      name: Front Door Lock
      layout: horizontal
      card_mod:
        style: |
          ha-card {
            background: none !important;
            box-shadow: none !important;
            margin-top: -10px !important;
            padding: 0;
