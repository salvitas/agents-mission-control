                                radial-gradient(circle at 30% 30%, rgba(255, 243,
                                10, 0.15), rgba(255, 243, 10, 0.05))
                            - box-shadow: >-
                                0 0 10px 1px rgba(255, 243, 10, 0.6), inset 1px 1px
                                2px rgba(255, 243, 10,0.9), inset -1px -1px 2px
                                rgba(255, 243, 10,0.2)
                          icon:
                            - color: gold
                      - value: "off"
                        styles:
                          icon:
                            - color: black
                    styles:
                      card:
                        - background: >-
                            linear-gradient(145deg, rgba(255, 255, 255, 0.12),
                            rgba(0, 0, 0, 0.08))
                        - border-radius: 50%
                        - box-shadow: >-
                            inset 1px 1px 2px rgba(255,255,255,0.2), inset -1px -1px
                            2px rgba(0,0,0,0.1)
                        - padding: 0
                        - width: 32px
                        - height: 32px
                      icon:
                        - font-size: 1.3em
                    custom_fields:
                      animate: |
                        [[[
                          if (states['input_boolean.mic_recording']?.state === 'on') {
                            return `<style>
                              @keyframes zoomReveal {
                                from { opacity: 0; transform: scale(0.7); }
                                to { opacity: 1; transform: scale(1); }
                              }
                              ha-card {
                                animation: zoomReveal 0.3s ease-out forwards;
                                animation-delay: 0.1s;
                                opacity: 0;
                              }
                            </style>`;
                          }
                          return '';
                        ]]]
                fan:
                  card:
                    type: custom:button-card
                    entity: input_boolean.mic_recording
                    show_name: false
                    icon: mdi:fan
                    show_state: false
                    tap_action:
                      action: toggle
                    state:
                      - value: "on"
                        styles:
                          card:
                            - background: >-
                                radial-gradient(circle at 30% 30%, rgba(2, 242, 250,
                                0.15), rgba(2, 242, 250, 0.05))
                            - box-shadow: >-
                                0 0 10px 1px rgba(2, 242, 250, 0.6), inset 1px 1px
