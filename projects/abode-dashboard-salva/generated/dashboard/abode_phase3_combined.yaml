                      card:
                        - background: >-
                            linear-gradient(145deg, rgba(255, 255, 255, 0.12),
                            rgba(0, 0, 0, 0.08))
                        - border-radius: 50%
                        - box-shadow: >-
                            inset 1px 1px 2px rgba(255,255,255,0.2), inset -1px -1px
                            2px rgba(0,0,0,0.1)
                        - padding: 0
                        - width: 32px
                        - height: 32px
                      icon:
                        - font-size: 1.3em
                    custom_fields:
                      animate: |
                        [[[
                          if (states['input_boolean.mic_recording']?.state === 'on') {
                            return `<style>
                              @keyframes zoomReveal {
                                from { opacity: 0; transform: scale(0.7); }
