                      </div>`;
                  ]]]
              styles:
                card:
                  - border-radius: 14px
                  - padding: 0.3rem
                  - background: none
                  - box-shadow: none
                grid:
                  - grid-template-areas: "\"icon\" \"n\""
                  - grid-template-rows: 1fr auto
                name:
