                      transform:
                        {% if any_left %}
                          translateX(-90px);
                        {% else %}
                          translateX(10px);
                        {% endif %};
                      filter: {% if any_left %}blur(0px){% else %}blur(4px){% endif %};
                      transition: all 0.4s ease-out;
    
