                         is_state('input_boolean.mic_recording','on') %}
                    {% set any_left = any_active or any_returning %}
    
                    /* Title animation */
                    .hk {
                      display: inline-block;
                      will-change: transform;
                      transition: transform 0.3s ease-out;
                      transform:
                        {% if any_left %}
                          translateX(-100px);
                        {% else %}
                          translateX(-74px);
                        {% endif %};
