        - type: conditional
          conditions:
            - entity: sensor.time
              state_not: none
          card:
            type: custom:mod-card
            card:
              type: vertical-stack
              cards:
                - type: custom:button-card
                  name: |
                    [[[
                      const tick = states['input_boolean.mic_recording']?.state;
    
                      let sensors = [
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time',
                        'sensor.time', 'sensor.time', 'sensor.time'
                      ];
    
                      let events = [];
    
                      sensors.forEach(s => {
                        let entity = states[s]?.state;
                        if (!entity || entity === 'unknown' || entity === 'unavailable') return;
                        let dt = new Date(entity);
                        let now = new Date();
                        if (dt <= now) return;
    
                        let diff = Math.floor((dt - now) / 60000); // in minutes
                        let hrs = Math.floor(diff / 60);
                        let mins = diff % 60;
                        
                        let timeStr = '';
                        if ((dt - now) >= 86400000) {
                          timeStr = dt.toLocaleString(undefined, { weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                        } else if (hrs >= 1) {
                          timeStr = hrs + ' hr' + (mins > 0 ? ' ' + mins + ' min' : '');
                        } else {
                          timeStr = diff + ' min';
                        }
    
    
    
                        let type = s.includes('timer') ? 'timer' : s.includes('alarm') ? 'alarm' : 'reminder';
                        let icon = type === 'timer' ? '🕒' : type === 'alarm' ? '⏰' : '🔔';
                        let device = s.replace('sensor.', '').split('_homepod_next_')[0].replaceAll('_', ' ');
                        device = device.charAt(0).toUpperCase() + device.slice(1);
    
                        let label = '';
                        if (type === 'reminder') {
                          label = states[s]?.attributes?.reminderLabel || states[s]?.attributes?.reminder || '';
                        }
    
                        let labelStr = label ? ': ' + label : '';
                        events.push({ t: dt.getTime(), line: icon + ' <b>' + timeStr + '</b> – ' + device + ' ' + type.charAt(0).toUpperCase() + type.slice(1) + labelStr });
                      });
    
                      events.sort((a, b) => a.t - b.t);
    
                      const newsTitle = states['sensor.time']?.attributes?.title;
                      const scrollLines = [];
    
                      // Top News Section
                      if (newsTitle) {
                        scrollLines.push(`<div class="scroll-item label news">🚨 <b>Top News:</b></div>`);
                        scrollLines.push(`<div class="scroll-item news-title">${newsTitle}</div>`);
                      }
    
                      // Spacer between Top News and Upcoming
                      if (newsTitle && events.length > 0) {
                        scrollLines.push(`<div class="scroll-item spacer"></div>`);
                      }
    
                      // Upcoming Label
                      scrollLines.push(`<div class="scroll-item label upcoming">🗓️ <b>Upcoming:</b></div>`);
    
                      if (events.length === 0) {
                        scrollLines.push(`<div class="scroll-item">No upcoming alarms, timers, reminders.</div>`);
                      } else {
                        events.forEach(e => scrollLines.push(`<div class="scroll-item event">${e.line}</div>`));
                      }
    
                      const content = scrollLines.join('');
                      return `<div class="scroll-area"><div class="scroll-track">${content + content + content}</div></div>`;
                    ]]]
                  tap_action:
                    action: url
                    url_path: >
                      [[[ return
                      states['sensor.time']?.attributes?.link ||
                      "#" ]]]
                  show_icon: false
                  show_state: false
                  styles:
                    card:
                      - background: rgba(255,255,255,0.05)
                      - border-radius: 1rem
                      - padding: 0rem
                      - height: 102px
                      - overflow: hidden
                      - color: white
                      - font-size: 0.85rem
                    name:
                      - white-space: normal
                      - overflow: hidden
                      - padding: 0
                      - margin: 0
                      - width: 90%
                      - height: 100%
                      - line-height: 1.4
                      - text-align: left
                  card_mod:
                    style: |
                      .scroll-area {
                        height: 100%;
                        overflow: hidden;
                        position: relative;
                      }
                      .scroll-track {
                        display: flex;
                        flex-direction: column;
                        animation: scroll-up 30s linear infinite;
                      }
                      .scroll-item {
                        padding: 0.2rem 0;
                      }
                      .scroll-item.label.news {
                        padding-top: 1rem;
                        padding-bottom: 0rem;
                      }
                      .scroll-item.news-title {
                        padding-top: 0.0rem;
                        padding-bottom: 0.0rem;
                        margin-left: 1rem;
                      }
                      .scroll-item.spacer {
                        padding-top: 0rem;
                      }
                      .scroll-item.label.upcoming {
                        padding-top: 1rem;
                        padding-bottom: 0rem;
                      }
                      .scroll-item.event {
                        padding-top: 0.2rem;
                        padding-bottom: 0.0rem;
                        margin-left: 1rem;
                      }
                      @keyframes scroll-up {
                        0% {
                          transform: translateY(0%);
                        }
                        100% {
                          transform: translateY(-33.333%);
                        }
                      }
