                                      text-shadow: 0 0 1px rgba(255, 255, 255, 0.7);
                                    ">
                                      <div style="display: flex; gap: 0.2em; align-items: center;">
                                        <span style="animation: drip 1.2s infinite ease-in-out;">💧</span>
                                        <span>${rainLabel}</span>
                                      </div>
                                    </div>
                                  </div>
                                `;
                              ]]]
                        - type: custom:button-card
                          entity: sensor.tomorrow_raw_hourly
                          variables:
                            dayOffset: 4
                          show_name: false
                          show_icon: false
                          show_state: false
                          layout: grid
                          styles:
                            grid:
                              - grid-template-areas: "\"day icon min bar max\""
                              - grid-template-columns: 2.5em 2em 3em 1fr 3em
                              - align-items: center
                              - column-gap: 0.4em
                            card:
                              - padding: 0.6em 0.8em
                              - background: none
                              - box-shadow: none
                              - border-radius: 0.8em
                              - height: 1.5em
                            custom_fields:
                              day:
                                - font-size: 0.8em
                              min:
                                - font-size: 0.8em
                              max:
                                - font-size: 0.8em
                          custom_fields:
                            day: |
                              [[[
                                const offset = variables.dayOffset || 0;
                                const today = new Date();
                                today.setUTCHours(0,0,0,0);
                                const target = new Date(today.getTime() + offset * 86400000);
                                return target.toLocaleDateString('en-GB', { weekday: 'short' });
                              ]]]
                            icon: |
                              [[[
                                const offset = variables.dayOffset || 0;
                                const hourly = entity?.attributes?.timelines?.hourly || [];
                                const iconMap = {
                                  1000: 'clear-day',
                                  1100: 'partly-cloudy-day',
                                  1101: 'partly-cloudy-day',
                                  1102: 'partly-cloudy-day',
                                  1001: 'cloudy',
                                  2000: 'fog',
                                  2100: 'fog',
                                  4000: 'drizzle',
                                  4001: 'rain',
                                  4200: 'rain',
                                  4201: 'rain',
                                  5000: 'snow',
                                  5001: 'snow',
                                  5100: 'snow',
                                  5101: 'snow',
                                  6000: 'freezing-rain',
                                  6001: 'freezing-rain',
                                  6200: 'freezing-rain',
                                  6201: 'freezing-rain',
                                  7000: 'ice-pellets',
                                  7101: 'ice-pellets',
                                  7102: 'ice-pellets',
                                  8000: 'thunderstorm'
                                };
    
                                const today = new Date();
                                today.setHours(0, 0, 0, 0);
                                const targetDate = new Date(today);
                                targetDate.setDate(targetDate.getDate() + offset);
    
                                const data = hourly.filter(h => {
                                  const t = new Date(h.time);
                                  return t.getFullYear() === targetDate.getFullYear() &&
                                         t.getMonth() === targetDate.getMonth() &&
                                         t.getDate() === targetDate.getDate();
                                });
    
                                const code = data[12]?.values?.weatherCode || 1000;
                                const icon = iconMap[code] || 'cloudy';
                                return `<img src="/local/weather-icons/weather-icons-master/design/fill/animation-ready/${icon}.svg" style="height:1.6em;" />`;
                              ]]]
                            min: |
                              [[[
                                const h = entity.attributes.timelines.hourly;
                                const offset = variables.dayOffset || 0;
                                const base = new Date();
                                base.setUTCHours(0,0,0,0);
                                const start = new Date(base.getTime() + offset * 86400000);
                                const end = new Date(start.getTime() + 86400000);
                                const temps = h.filter(i => {
                                  const t = new Date(i.time);
                                  return t >= start && t < end;
                                }).map(i => i.values.temperature);
                                const min = Math.min(...temps);
                                return isFinite(min) ? `${Math.round(min)}°C` : '';
                              ]]]
                            max: |
                              [[[
                                const h = entity.attributes.timelines.hourly;
                                const offset = variables.dayOffset || 0;
                                const base = new Date();
                                base.setUTCHours(0,0,0,0);
                                const start = new Date(base.getTime() + offset * 86400000);
                                const end = new Date(start.getTime() + 86400000);
                                const temps = h.filter(i => {
                                  const t = new Date(i.time);
                                  return t >= start && t < end;
                                }).map(i => i.values.temperature);
                                const max = Math.max(...temps);
                                return isFinite(max) ? `${Math.round(max)}°C` : '';
                              ]]]
                            bar: |
                              [[[
                                const h = entity.attributes.timelines.hourly;
                                const offset = variables.dayOffset || 0;
                                const base = new Date();
                                base.setUTCHours(0, 0, 0, 0);
                                const start = new Date(base.getTime() + offset * 86400000);
                                const end = new Date(start.getTime() + 86400000);
                                const temps = h.filter(i => {
                                  const t = new Date(i.time);
                                  return t >= start && t < end;
                                }).map(i => i.values.temperature);
                                if (!temps.length) return '';
    
                                const allTemps = entity.attributes.timelines.hourly
                                  .slice(0, 120)
                                  .map(i => i.values.temperature);
                                const overallMin = Math.min(...allTemps);
                                const overallMax = Math.max(...allTemps);
    
                                const min = Math.min(...temps);
                                const max = Math.max(...temps);
                                const left = ((min - overallMin) / (overallMax - overallMin)) * 100;
                                const rawWidth = ((max - min) / (overallMax - overallMin)) * 100;
                                const width = Math.max(rawWidth, 15);  // Ensure minimum 15% width
    
                                // FIX: Calculate the correct background size and position
                                // 1. Calculate how much wider the background needs to be than the bar itself.
                                //    If the bar is 50% wide, the background needs to be 200% wide.
                                const bgSize = 100 / (width / 100);
    
                                // 2. Calculate the horizontal position of the background.
                                //    This shifts the oversized background so the correct color slice is visible.
                                const bgPos = left / (100 - width) * 100;
    
    
                                // Rain chance
                                const rainHours = h.filter(i => {
                                  const t = new Date(i.time);
                                  return t >= start && t < end;
                                });
                                const rainChances = rainHours.map(i => i.values.precipitationProbability || 0);
                                const maxRain = Math.round(Math.max(...rainChances));
                                const rainLabel = `${maxRain}%`;
    
                                const id = Math.random().toString(36).substring(2, 9);
    
                                return `
                                  <style>
                                    @keyframes fillAnim-${id} {
                                      from { transform: scaleX(0); opacity: 0.3; }
                                      to { transform: scaleX(1); opacity: 1; }
                                    }
                                    @keyframes drip {
                                      0% { transform: translateY(0); opacity: 0.9; }
                                      50% { transform: translateY(2px); opacity: 0.5; }
                                      100% { transform: translateY(0); opacity: 0.9; }
                                    }
                                  </style>
                                  <div style="
                                    position: relative;
                                    width: 100%;
                                    height: 1.1em;
                                    border-radius: 1em;
                                    overflow: hidden;
                                    background: rgba(255, 255, 255, 0.02);
                                    backdrop-filter: blur(8px);
                                    -webkit-backdrop-filter: blur(8px);
                                    box-shadow:
                                      inset 0 0 1px rgba(255, 255, 255, 0.15),
                                      inset 0 0 1px rgba(144, 255, 200, 0.25);
                                  ">
                                    <div style="
                                      position: absolute;
                                      top: 0;
                                      bottom: 0;
                                      left: ${left}%;
                                      width: ${width}%;
                                      transform-origin: left;
                                      transform: scaleX(0);
                                      background: linear-gradient(to right, #51fcd4, #fff06e, #ffb347);
                                      /* FIX: Apply the calculated size and position */
                                      background-size: ${bgSize}% 100%;
                                      background-position: ${bgPos}% 0%;
                                      border-radius: 1em;
                                      box-shadow:
                                        inset 1px 1px 2px rgba(255, 255, 255, 0.5),
                                        inset -1px -1px 2px rgba(0, 0, 0, 0.05),
                                        0 0 8px rgba(144, 255, 200, 0.5),
                                        0 0 12px rgba(255, 170, 200, 0.2);
                                      backdrop-filter: blur(6px);
                                      -webkit-backdrop-filter: blur(6px);
                                      animation: fillAnim-${id} 1.4s ease-out 3.2s forwards;
                                
                                      display: flex;
                                      align-items: center;
                                      justify-content: center;
                                      font-size: 0.6em;
                                      font-weight: bold;
                                      color: rgba(30, 20, 80, 0.95);
                                      text-shadow: 0 0 1px rgba(255, 255, 255, 0.7);
                                    ">
                                      <div style="display: flex; gap: 0.2em; align-items: center;">
                                        <span style="animation: drip 1.2s infinite ease-in-out;">💧</span>
                                        <span>${rainLabel}</span>
                                      </div>
                                    </div>
                                  </div>
                                `;
                              ]]]
                  - type: custom:button-card
                    styles:
                      card:
                        - background: none
                        - border-radius: 1.5rem
                        - box-shadow: >
                            inset 0 0 8px rgba(255,255,255,0.03), 0 6px 20px
                            rgba(0,0,0,0.4)
                        - overflow: hidden
                        - position: relative
                    custom_fields:
                      chart: |
                        [[[
                          // Responsive width: use the card's width, fallback to 480 if not available
                          const card = this;
                          const width = 480;
                          const height = 90;
                          const leftMargin = 20;
                          const rightMargin = 10;
                          const topPadding = 20;
                          const bottomPadding = 20;
    
                          const raw = states['sensor.tomorrow_raw_hourly'];
                          const timeline = raw?.attributes?.timelines?.hourly?.slice(0, 12) ?? [];
                          const temps = timeline.map(x => x.values.temperature);
                          const times = timeline.map(x => new Date(x.time).getHours());
    
                          const minTemp = Math.min(...temps);
                          const maxTemp = Math.max(...temps);
                          const range = maxTemp - minTemp || 1;
    
                          const points = temps.map((t, i) => {
                            const x = leftMargin + (i / (temps.length - 1)) * (width - leftMargin - rightMargin);
                            const y = topPadding + (1 - (t - minTemp) / range) * (height - topPadding - bottomPadding);
                            return [x, y];
                          });
    
                          const linePath = points.map((p, i, a) => {
                            if (i === 0) return `M ${p[0]},${p[1]}`;
                            const [x1, y1] = a[i - 1];
                            const [x2, y2] = p;
                            const mx = (x1 + x2) / 2;
                            return `Q ${x1},${y1} ${mx},${(y1 + y2) / 2}`;
                          }).join(' ');
    
                          const areaPath = 
                            `M ${leftMargin - 20},${height}
                            Q ${leftMargin - 10},${points[0][1] + 10} ${points[0][0]},${points[0][1]}
                            ${points.map((p, i, a) => {
                              if (i === 0) return '';
                              const [x1, y1] = a[i - 1];
                              const [x2, y2] = p;
                              const mx = (x1 + x2) / 2;
                              return `Q ${x1},${y1} ${mx},${(y1 + y2) / 2}`;
                            }).join(' ')}
                            L ${points[points.length - 1][0]},${height}
                            Z`
                          ;
    
                          return `
                            <svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet" style="display:block;margin:0 auto;">
                              <defs>
                                <linearGradient id="tempLine" x1="0" y1="0" x2="1" y2="0">
                                  <stop offset="0%" stop-color="#ffc658"/>
                                  <stop offset="100%" stop-color="#ff7300"/>
                                </linearGradient>
                                <linearGradient id="tempArea" x1="0" y1="0" x2="0" y2="1">
                                  <stop offset="0%" stop-color="#ff8c00" stop-opacity="0.25"/>
                                  <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
                                </linearGradient>
                                <filter id="shadow">
                                  <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.3)" />
                                </filter>
                              </defs>
    
                              <path d="${areaPath}" fill="url(#tempArea)"/>
    
                              <path d="${linePath}" fill="none" stroke="url(#tempLine)" stroke-width="2.5" stroke-linecap="round"
                                    filter="url(#shadow)" stroke-dasharray="1000" stroke-dashoffset="1000">
                                <animate attributeName="stroke-dashoffset" from="1000" to="0" dur="3s" begin="4.5s" fill="freeze" />
                              </path>
    
                              ${points.map(([x, y], i) => i % 2 === 0 ? 
                                `<circle cx="${x}" cy="${y}" r="0" fill="white" stroke="url(#tempLine)" stroke-width="2.5" visibility="hidden">
                                  <set attributeName="visibility" to="visible" begin="4s" />
                                  <animate attributeName="r" values="0;4.5" dur="0.3s" begin="4s" fill="freeze" />
                                </circle>` : '').join('')}
    
                              ${points.map(([x, y], i) => i % 2 === 0 ? 
                                `<text x="${x}" y="${y - 10}" text-anchor="middle" font-size="13" fill="white"
                                      style="font-weight: 500; text-shadow: 0 0 2px rgba(0,0,0,0.4);">
                                  ${temps[i].toFixed(1)}°
                                </text>` : '').join('')}
    
                              ${points.map(([x], i) => i % 2 === 0 ? 
                                `<text x="${x}" y="${height - 1}" text-anchor="middle" font-size="11" fill="white" style="opacity: 0.6;">
                                  ${String(times[i]).padStart(2, '0')}:00
                                </text>` : '').join('')}
                            </svg>
                          `;
                        ]]]
                    show_icon: false
                    show_name: false
                    show_state: false
                    card_mod:
                      style: |
                        ha-card {
                          width: 100% !important;
                          max-width: 100vw !important;
                          min-width: 0 !important;
                          background: none !important;
                          box-shadow: none !important;
                          margin-bottom: -30px !important;
                          margin-top: -24px !important;
                          
                        }

  # 2 - Energy Card.salva.yaml
  - # energy_card.yaml
    # Purpose:
    #   Glassmorphic energy summary card showing Electricity & Gas current cost
    #   and a 24-hour animated cost graph using mini-graph-card.
    #
    # Dependencies (custom cards):
    #   - custom:stack-in-card
    #   - custom:button-card
    #   - custom:mini-graph-card
    #   - card-mod
    #
    # Required entities:
    #   - sensor.time                  (current electricity cost)
    #   - sensor.time                           (current gas cost)
    #   - sensor.time        (24h electricity graph)
    #   - sensor.time                (24h gas graph)
    #
    # Adapt for your setup:
    #   - Replace entity IDs above with your own energy sensors.
    #   - Edit color values (#47C1E8 and #ffaa00) to restyle the card.
    #   - Adjust background gradient as needed.
    
    
    type: custom:stack-in-card
    card_mod:
      style: |
        ha-card {
          width: 100% !important;
          margin: 0 auto;
          padding: 8px;
          box-sizing: border-box;
          background: linear-gradient(135deg, rgba(151, 87, 167, 0.25), rgba(75, 124, 132, 0.25));
          border-radius: 24px;
          backdrop-filter: blur(16px);
          -webkit-backdrop-filter: blur(20px);
          box-shadow:
            0 1px 6px rgba(0, 0, 0, 0.18),
            inset 0 0 6px rgba(255, 255, 255, 0.02);
          border: 1px solid rgba(255, 255, 255, 0.08);
          transition: all 0.3s ease;
        }
    
        @keyframes pulseBlue {
          0%   { transform: scale(1); opacity: 1; }
          50%  { transform: scale(1.04); opacity: 0.8; }
          100% { transform: scale(1); opacity: 1; }
        }
    
        @keyframes pulseOrange {
          0%   { transform: scale(1); opacity: 1; }
          50%  { transform: scale(1.04); opacity: 0.85; }
          100% { transform: scale(1); opacity: 1; }
        }
    cards:
      - type: horizontal-stack
        cards:
          - type: custom:button-card
            entity: sensor.time
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              content: |
                [[[
                  let val = parseFloat(entity?.state);
                  if (isNaN(val)) val = 0;
                  const price = '£' + val.toFixed(2);
                  return `
                    <div style="
                      display:flex;
                      align-items:center;
                      justify-content:flex-start;
                      gap:6px;
                      margin-left:6px;
                    ">
                      <ha-icon icon="mdi:lightning-bolt-circle"
                        style="
                          color:#47C1E8;
                          width:20px;
                          height:20px;
                          filter:drop-shadow(0 0 2px rgba(71,193,232,0.6));
                        ">
                      </ha-icon>
                      <span style="font-weight:bold;font-size:13px;color:#47C1E8;">
                        Electricity
                      </span>
                      <span style="font-weight:bold;font-size:13px;color:#47C1E8;">|</span>
                      <span style="font-weight:bold;font-size:13px;color:#47C1E8;">
                        ${price}
                      </span>
                    </div>
                  `;
                ]]]
            styles:
              card:
                - background: rgba(255,255,255,0.05)
                - border-radius: 1em
                - box-shadow: inset 0 0 10px rgba(71, 193, 232, 0.4)
                - padding: 6px 16px
                - display: flex
                - align-items: center
                - justify-content: flex-start
              custom_fields:
                content:
                  - width: 100%
          - type: custom:button-card
            entity: sensor.time
            show_icon: false
            show_name: false
            show_state: false
            custom_fields:
              content: |
                [[[
                  let val = parseFloat(entity?.state);
                  if (isNaN(val)) val = 0;
                  const price = '£' + val.toFixed(2);
                  return `
                    <div style="
                      display:flex;
                      align-items:center;
                      justify-content:flex-start;
                      gap:6px;
                    ">
                      <ha-icon icon="mdi:fire-circle"
                        style="
                          color:#ffaa00;
                          width:20px;
                          height:20px;                                
                          filter:drop-shadow(0 0 2px rgba(255,170,0,0.5));
                        ">
                      </ha-icon>
                      <span style="font-weight:bold;font-size:13px;color:#ffaa00;">
                        Gas
                      </span>
                      <span style="font-weight:bold;font-size:13px;color:#ffaa00;">|</span>
                      <span style="font-weight:bold;font-size:13px;color:#ffaa00;">
                        ${price}
                      </span>
                    </div>
                  `;
                ]]]
            styles:
              card:
                - background: rgba(255,255,255,0.05)
                - border-radius: 1em
                - box-shadow: inset 0 0 10px rgba(255, 170, 0, 0.3)
                - padding: 6px 30px
                - display: flex
                - align-items: center
                - justify-content: flex-start
              custom_fields:
                content:
                  - width: 100%
      - type: conditional
        conditions:
          - entity: sensor.time
            state_not: unknown
          - entity: sensor.time
            state_not: unknown
        card:
          type: custom:mini-graph-card
          entities:
            - entity: sensor.time
              name: Electricity
              color: "#47C1E8"
            - entity: sensor.time
              name: Gas
              color: "#ffaa00"
          hours_to_show: 24
          points_per_hour: 1
          animate: true
          line_width: 3
          smoothing: true
          show:
            name: false
            icon: false
            state: false
            legend: false
            labels: true
            fill: fade
          font_size: 90
          card_mod:
            style: |
              ha-card {
                background: none !important;
                box-shadow: none !important;
                border-radius: 0 0 14px 14px !important;
                overflow: hidden;
                padding-bottom: 8px;
                margin-top: -24px;
                
              }
              .graph {
                border-radius: 0 0 14px 14px;
                overflow: hidden;
              }
    
              /* Delay the path animation by 1.8s */
              .graph svg path {
                animation-delay: 4s !important;
                animation-duration: 2.5s !important;
              }

  # 3 - Media Centre Card.salva.yaml
  - # media_centre_card.yaml
    # Purpose:
    #   All-in-one Media Centre for an Siri-based Home Assistant setup.
    #   - Shows the active HomePod player in a bubble media card (via sensor.time).
    #   - Popups for Announcements, Music Requests, Drop-In intercom, Alarms/Timers/Reminders.
    #   - A scrolling ticker for Top News + upcoming alarms/timers/reminders across all HomePod devices.
    #
    # Dependencies (custom cards / integrations):
    #   - custom:mod-card
    #   - custom:bubble-card
    #   - custom:button-card
    #   - custom:state-switch
    #   - mushroom cards: mushroom-select-card, mushroom-number-card, mushroom-title-card
    #   - custom:text-input-row
    #   - card-mod
    #   - browser_mod (for popups & javascript actions)
    #
    # Key entities (adapt for your setup):
    #   - sensor.time
    #   - media_player.*_homepod  (Hallway, Kitchen, Lounge, Master Bedroom, Upstairs, Room 2/3/4, Study, Everywhere)
    #   - media_player.homepod, media_player.homepod
    #
    #   Announcement popup:
    #     - input_text.announcement_message
    #     - input_boolean.mic_recording
    #     - input_boolean.mic_recording, homepod_kitchen, homepod_lounge, homepod_master_bedroom,
    #       homepod_upstairs, homepod_room_2, homepod_room_3, homepod_room_4, homepod_study, all_homepodes
    #     - script.play_requested_music
    #
    #   Music Request popup:
    #     - input_text.music_request_query
    #     - input_text.last_music_request
    #     - input_select.music_target_speaker
    #     - input_select.music_transfer_targets
    #     - script.play_requested_music
    #     - script.play_requested_music
    #
    #   Drop-In popup:
    #     - input_select.intercom_source
    #     - input_select.intercom_target
    #     - script.play_requested_music
    #
    #   Alarms / Timers / Reminders popup:
    #     - input_select.music_target_speaker
    #     - input_select.music_target_speaker
    #     - input_select.music_target_speaker
    #     - input_number.alexa_timer_value
    #     - input_select.music_target_speaker
    #     - script.play_requested_music
    #     - input_select.music_target_speaker
    #     - input_number.alexa_timer_value
    #     - input_select.music_target_speaker
    #     - script.play_requested_music
    #     - input_select.music_target_speaker
    #     - input_text.music_request_query
    #     - script.play_requested_music
    #
    #   News + upcoming events ticker:
    #     - sensor.time
    #     - input_boolean.mic_recording          (used purely as a regular "tick" to refresh display)
    #     - sensor.*_homepod_next_reminder           (for each HomePod)
    #     - sensor.*_homepod_next_alarm
    #     - sensor.*_homepod_next_timer
    #
    # Notes:
    #   - All styling is inline to support Storage Mode (no !include / templates).
    #   - Replace entity IDs with your own if names differ.
    
    
    
    type: custom:mod-card
    style:
      .: |
        ha-card {
          width: 100%;
          height: 250px;
          background: linear-gradient(135deg, rgba(255, 0, 00, 0.25), rgba(50, 60, 110, 0.55));
          border-radius: 24px;
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(30px);
          box-shadow:
            0 2px 8px rgba(0, 0, 0, 0.25),
            inset 0 0 8px rgba(255, 255, 255, 0.03);
          padding: 8px;
          margin: 0 auto;
          margin-top: 0px;
          margin-bottom: -14px;
          border: 1px solid rgba(255, 255, 255, 0.12);
          transition: all 0.3s ease;
          color: white;
          font-size: 18px;
          font-weight: bold;
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    card:
