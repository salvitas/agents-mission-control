                  - padding-top: 0px
                custom_fields:
                  icon:
                    - display: flex
                    - justify-content: center
                    - align-items: center
            - type: custom:button-card
              name: Heat
              entity: sensor.time
              tap_action:
                action: fire-dom-event
                browser_mod:
